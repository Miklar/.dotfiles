# tmux-notify.conf — source from .tmux.conf to enable notification UI
# Add to .tmux.conf:  source-file ~/.dotfiles/tmux/tmux-notify.conf

# Status bar: show bell icon while /tmp/tmux-notify-flag exists.
# Clears automatically (notify.sh removes the flag after NOTIFY_INDICATOR_DURATION seconds).
set -g status-right '#([ -f /tmp/tmux-notify-flag ] && echo "🔔" || true)'

# Prefix+G: jump to the session/window that triggered the last notification.
bind-key G run-shell '[ -f /tmp/tmux-notify-source ] \
    && tmux switch-client -t "$(cat /tmp/tmux-notify-source)" \
    || tmux display-message "No notification source recorded"'

# Prefix+N: toggle all notifications (tmux + OS) on/off.
# Creates/removes /tmp/tmux-notify-silent.
bind-key N run-shell '[ -f /tmp/tmux-notify-silent ] \
    && rm -f /tmp/tmux-notify-silent \
    && tmux display-message "Notifications ON" \
    || { touch /tmp/tmux-notify-silent; tmux display-message "Notifications SILENCED"; }'
