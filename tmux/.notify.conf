# notify.conf — defaults for notify.sh
# All values can be overridden by env vars at call time.

# Target tmux session. Options:
#   ""    = current session (wherever notify.sh is called from)
#   "all" = broadcast to every active session
#   "foo" = specific session named foo
NOTIFY_SESSION=""

# Target window within NOTIFY_SESSION (empty = current window)
# Only used when NOTIFY_SESSION is a specific session name.
NOTIFY_WINDOW=""

# OS notifications. 1=on, 0=off.
# Override per-call: CLAUDE_NOTIFY_OS=0 notify.sh "msg"
NOTIFY_OS=1

# macOS sound name. "" = silent, "default", "Basso", "Glass", "Ping", etc.
NOTIFY_SOUND="default"

# Linux urgency: low / normal / critical
NOTIFY_URGENCY="normal"

# Seconds the 🔔 indicator stays in the tmux status bar
NOTIFY_INDICATOR_DURATION=10
